services:
  # Backend Web Service
  - type: web
    name: apex-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/liveness
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: APP_ENV
        value: staging
      - key: APP_MODE
        value: live
      - key: DATABASE_URL
        fromDatabase:
          name: apex-postgres
          property: connectionString
      - key: ENABLE_AUTH
        value: "True"
      - key: ENABLE_WORKSPACES
        value: "True"
      - key: CORS_ORIGINS
        sync: false # Must be set to the frontend URL manually
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FILE_STORAGE_PROVIDER
        value: local
      # Local storage persistence requires a disk
    disk:
      name: apex-uploads
      mountPath: /opt/render/project/src/data/uploads
      sizeGB: 1

  # Frontend Web Service (Next.js with SSR)
  - type: web
    name: apex-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
      - key: NEXT_PUBLIC_API_URL
        sync: false # Must be set to the backend URL manually (e.g. https://apex-backend.onrender.com)

databases:
  # PostgreSQL Database
  - name: apex-postgres
    databaseName: apex_staging
    user: apex_user
    plan: free # Update to a paid plan if necessary
